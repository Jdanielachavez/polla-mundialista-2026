function initFirebase() {
  const isConfigured = FIREBASE_CONFIG.databaseURL &&
                       !FIREBASE_CONFIG.databaseURL.includes('TU_PROYECTO');
  const banner = document.getElementById('firebase-banner');

  if (!isConfigured) {
    banner.style.display = 'block';
    banner.textContent = '⚠️ Modo local — los datos solo se guardan en este dispositivo.';
    loadLocal();
    return;
  }

  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseOK = true;

    // Check for group in URL
    GID = new URLSearchParams(window.location.search).get('g');

    if (!GID) {
      // No group — show landing page
      document.getElementById('nav').style.display = 'none';
      document.querySelector('.main').style.display = 'none';
      document.getElementById('pageLanding').style.display = 'block';
      renderLanding();
      return;
    }

    // Load group config
    db.ref(`/groups/${GID}/config`).once('value').then(snap => {
      GC = snap.val();
      if (!GC) {
        alert('Grupo no encontrado');
        window.location.href = window.location.pathname;
        return;
      }
      // Update header with group name and logo
      document.getElementById('headerSubtitle').textContent = GC.name;
      if (GID === 'cooperativa-familiar') {
        document.getElementById('headerLogo').src = 'logo.jpg';
      }

      banner.style.display = 'block';
      banner.classList.add('connected');
      banner.textContent = '🟢 Conectado en tiempo real — todos ven los cambios al instante';

      // Real-time listener — pollas
      db.ref(gRef('pollas')).on('value', snap => {
        state.pollas = snap.val() || {};
        refreshCurrentPage();
      });

      // Real-time listener — resultados oficiales
      db.ref(gRef('resultados')).on('value', snap => {
        state.resultados = snap.val() || null;
        recalcAll(false);
        refreshCurrentPage();
      });

      showPage('home');
      fetchWorldCupResults(); // carga resultados al abrir la página
    });
  } catch(e) {
    console.error('Firebase:', e);
    banner.style.display = 'block';
    banner.textContent = '❌ Error Firebase: ' + e.message;
    loadLocal();
  }
}

function saveData() {
  if (firebaseOK && db && GID) {
    db.ref(gRef('pollas')).set(state.pollas || {});
    if (state.resultados) db.ref(gRef('resultados')).set(state.resultados);
  } else {
    localStorage.setItem('pm26_pollas', JSON.stringify(state.pollas));
    localStorage.setItem('pm26_res', JSON.stringify(state.resultados));
  }
}

function loadLocal() {
  try {
    state.pollas = JSON.parse(localStorage.getItem('pm26_pollas') || '{}');
    state.resultados = JSON.parse(localStorage.getItem('pm26_res') || 'null');
  } catch(e) {

}

// ============================================================
// URL del intermediario (Val.town) que trae los resultados del Mundial 2026
// desde football-data.org con CORS habilitado. El token va seguro en el servidor.
const RESULTS_API_URL = 'https://polla-mundialista-2026-results.val.run/';

async function fetchWorldCupResults() {
  const statusEl = document.getElementById('apiStatus');
  const setStatus = msg => { if(statusEl) statusEl.textContent = msg; };
  setStatus('🔄 Obteniendo resultados del Mundial...');

  try {
    const res = await fetch(RESULTS_API_URL, {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || data.error) throw new Error(data && data.error ? data.error : 'respuesta vacía');

    state.resultados = data;
    recalcAll(false); // recalcula los puntos localmente

    // Guardar SOLO los resultados (nunca las pollas) para no afectar a nadie
    if (firebaseOK && db && GID) {
      db.ref(gRef('resultados')).set(data);
    } else {
      localStorage.setItem('pm26_res', JSON.stringify(data));
    }

    const grp = data.grupos ? Object.keys(data.grupos).length : 0;
    setStatus('✅ Sincronizado: ' + new Date().toLocaleTimeString('es') +
              (grp ? ' · ' + grp + ' grupos' : '') +
              (data.champion ? ' · Campeón: ' + data.champion : ''));
    toast('✅ Resultados actualizados');
    refreshCurrentPage();

  } catch(e) {
    console.error('Resultados API error:', e);
    setStatus('❌ No se pudieron obtener los resultados: ' + e.message);
  }
}

function startAutoSync() {
  if (autoSyncTimer) clearInterval(autoSyncTimer);
  fetchWorldCupResults();
  autoSyncTimer = setInterval(fetchWorldCupResults, 15 * 60 * 1000); // cada 15 min
}

// ============================================================
// SCORING
// ============================================================
function calcPoints(polla, res) {
  if (!res) return 0;
  let pts = 0;

  function predPassed(team, round) {
    if (round === 'r32') {
      for (const g of Object.keys(GROUPS)) {
        if (GROUPS[g].includes(team)) {
          const pg = polla.grupos && polla.grupos[g];
          if (!pg) return false;
          if (pg.p1 === team || pg.p2 === team) return true;
          if (pg.p3 === team && polla.terceros && polla.terceros.includes(g)) return true;
          return false;
        }
      }
      return false;
    }
    return polla.bracket && polla.bracket[round] && polla.bracket[round].includes(team);
  }

  if (res.bracket) {
    for (const rnd of ['r32','r16','qf','sf']) {
      for (const team of (res.bracket[rnd] || [])) {
        if (predPassed(team, rnd)) pts += PTS[rnd];
      }
    }
    // +1 por acertar quién GANA en 16avos (pasa a 8avos)
    if (res.bracket.r32win && polla.bracket && polla.bracket.r32) {
      for (const team of res.bracket.r32win) {
        if (polla.bracket.r32.includes(team)) pts += PTS.r16;
      }
    }
  }
  if (res.champion && polla.champion === res.champion) pts += PTS.champion;
  if (res.second   && polla.second   === res.second)   pts += PTS.second;
  if (res.third    && polla.third    === res.third)    pts += PTS.third;
  if (res.fourth   && polla.fourth   === res.fourth)   pts += PTS.fourth;
  if (res.topScorer && polla.topScorer &&
      polla.topScorer.toLowerCase().trim() === res.topScorer.toLowerCase().trim())
    pts += PTS.scorer;
  return pts;
}

function recalcAll(persist) {
  if (!state.resultados) return;
  for (const id of Object.keys(state.pollas)) {
    state.pollas[id].points = calcPoints(state.pollas[id], state.resultados);
  }
  if (persist) saveData();
}

  if (!name) { toast('⚠️ Escribe el nombre del grupo'); return; }

  // Generate slug
  const slug = name.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
    .substring(0, 40);

  const config = {
    name,
    price,
    createdAt: new Date().toISOString()
  };

  // Check if slug exists
  const snap = await db.ref(`/groups/${slug}/config`).once('value');
  const finalSlug = snap.exists() ? slug + '-' + Date.now().toString(36).slice(-4) : slug;

  await db.ref(`/groups/${finalSlug}/config`).set(config);
  window.location.href = window.location.pathname + '?g=' + finalSlug;
};

    state.user = {name, isAdmin:false};
    hideOverlay();
    showPage('home');
    toast('¡Bienvenido, ' + name + '! 👋');
  }
}

  if (pass === GLOBAL_PASS) {

    hideOverlay();
    showPage('admin');

}

window.showPollaDetail = id => {
  const p = state.pollas[id];
  if (!p) return;
  const res = state.resultados;
  const ck = (actual, pred) => actual && pred && actual === pred ? '✅' : '';
  // ¿Equipo clasificó a 16avos? (está en res.bracket.r32)
  const qual = t => t && res?.bracket?.r32?.includes(t) ? ' ✅' : '';
  // ¿Equipo ganó esa ronda? (está en res.bracket[round])
  const wonR = (t, round) => t && res?.bracket?.[round]?.includes(t) ? ' ✅' : '';

  // --- FASE DE GRUPOS: 12 grupos con 1°/2°/3° elegidos ---
  const gruposHTML = Object.keys(GROUPS).sort().map(g => {
    const pg = (p.grupos && p.grupos[g]) || {};
    const isTerc = p.terceros && p.terceros.includes(g);
    const row = (pos, team, extra='') =>
      `<div style="font-size:12px;padding:2px 0">${pos} ${team ? fl(team) : '—'}${extra}</div>`;
    return `<div class="group-card" style="padding:9px">
      <div class="group-label" style="font-size:13px;margin-bottom:5px">Grupo ${g}</div>
      ${row('<b style="color:var(--gold)">1°</b>', pg.p1, qual(pg.p1))}
      ${row('<b style="color:#6060ee">2°</b>', pg.p2, qual(pg.p2))}
      ${pg.p3 ? row('<b style="color:#886644">3°</b>', pg.p3, qual(pg.p3) + (isTerc?' <span class="tag ty" style="font-size:8px;padding:1px 4px">tercero</span>':'')) : ''}
    </div>`;
  }).join('');

  // --- LLAVES: equipos elegidos para ganar cada ronda ---
  const rounds = [['r32','16avos de Final'],['r16','8avos de Final'],['qf','Cuartos de Final'],['sf','Semifinal']];
  const bracketHTML = rounds.map(([key,label]) => {
    const picks = (p.bracket && p.bracket[key]) || [];
    if (!picks.length) return '';
    return `<div style="margin-bottom:10px">
      <div class="muted" style="font-size:12px;font-weight:700;margin-bottom:5px">${label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${picks.map(t=>`<span class="tag tm" style="font-size:11px">${fl(t)}${key==='r32'?(res?.bracket?.r32win?.includes(t)?' ✅':''):wonR(t,key)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  showOverlay(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2>${p.userName}</h2>
      <span class="tag ${p.paid?'tg':'tr'}">${p.paid?'✓ Pagó':'✗ Debe'}</span>
    </div>
    ${p.pollaNr?`<div class="muted" style="margin-bottom:10px">Polla #${p.pollaNr}</div>`:''}
    <div class="champ-box">
      <div class="champ-trophy">🏆</div>
      <div class="champ-label">Campeón predicho</div>
      <div class="champ-name">${p.champion||'—'} ${ck(res?.champion, p.champion)}</div>
    </div>
    <div class="summary-row"><span class="muted">Subcampeón</span><span style="font-weight:700">${p.second||'—'} ${ck(res?.second,p.second)}</span></div>
    <div class="summary-row"><span class="muted">3er puesto</span><span style="font-weight:700">${p.third||'—'} ${ck(res?.third,p.third)}</span></div>
    <div class="summary-row"><span class="muted">4to puesto</span><span style="font-weight:700">${p.fourth||'—'} ${ck(res?.fourth,p.fourth)}</span></div>
    <div class="summary-row"><span class="muted">Goleador ⚽</span><span style="font-weight:700">${p.topScorer||'—'} ${res?.topScorer&&p.topScorer&&res.topScorer.toLowerCase()===p.topScorer.toLowerCase()?'✅':''}</span></div>
    <div class="summary-row"><span class="muted"><strong>Puntos</strong></span><span class="gold" style="font-weight:900;font-size:18px">${p.points||0} pts</span></div>

    <div class="divider"></div>
    <div class="card-title" style="font-size:15px">⚽ Clasificación de Grupos elegida</div>
    <div class="group-grid">${gruposHTML}</div>

    ${bracketHTML ? `
      <div class="divider"></div>
      <div class="card-title" style="font-size:15px">🔑 Llaves elegidas (ganadores por ronda)</div>
      ${bracketHTML}` : ''}

    <button class="btn btn-outline" style="margin-top:14px" onclick="hideOverlay()">Cerrar</button>
  `);
};

// ============================================================
// NUEVA POLLA — WIZARD
// ============================================================
const STEPS = ['grupos','r32','r16','qf','sf','final','goleador'];

function startDraft() {
  const cnt = Object.values(state.pollas).filter(p => p.userName === state.user?.name).length;
  draft = {
    id: uid(), userName: state.user?.name, pollaNr: cnt+1,
    paid: false, grupos: {}, terceros: [],
    picks: {r32:{}, r16:{}, qf:{}, sf:{}},
    bracket: {r32:[],r16:[],qf:[],sf:[]},
    champion:null, second:null, third:null, fourth:null,
    topScorer:'', points:0, step:0
  };
}

function renderNueva() {
  const el = document.getElementById('pageNueva');
  if (!state.user) {
    el.innerHTML = '<div class="alert">Inicia sesión primero.</div><button class="btn btn-red" onclick="showPage(\'home\')">Ir a Inicio</button>';
    return;
  }
  if (!draft) startDraft();
  renderStep();
}

function renderStep() {
  const el = document.getElementById('pageNueva');
  const lbl = ['Grupos','16avos','8avos','Cuartos','Semis','Final','Goleador'];
  const stBar = `<div class="steps-bar">${lbl.map((l,i)=>
    `<div class="step-dot ${i<draft.step?'done':i===draft.step?'active':''}">${i<draft.step?'✓':i+1}</div>${i<lbl.length-1?'<div class="step-line"></div>':''}`
  ).join('')}</div>`;
  let content = '';
  if      (draft.step === 0) content = stepGrupos();
  else if (draft.step >= 1 && draft.step <= 4) content = stepBracket();
  else if (draft.step === 5) content = stepFinal();
  else if (draft.step === 6) content = stepGoleador();
  el.innerHTML = stBar + content;
  attachGroupEvents();
  const si = document.getElementById('scorerInput');
  if (si) {
    si.addEventListener('input', () => {
      draft.topScorer = si.value.trim();
      debounceScorerPhoto(si.value.trim());
    });
    if (draft.topScorer) debounceScorerPhoto(draft.topScorer);
  }
}

function stepGrupos() {
  const firstSec = Object.values(draft.grupos).reduce((a,g)=>a+(g.p1?1:0)+(g.p2?1:0),0);
  const tercCnt  = draft.terceros.length;
  const totalR32 = firstSec + tercCnt;
  const allGroups12 = Object.keys(GROUPS).every(g => { const pg = draft.grupos[g]; return pg && pg.p1 && pg.p2; });
  const allDone  = allGroups12 && tercCnt === 8;
  return `
    <div class="card">
      <div class="card-title">Paso 1: Clasifica los Grupos</div>
      <div class="alert info" style="font-size:13px">
        Toca los equipos en orden: 1° toque = <strong style="color:var(--gold)">1°</strong>,
        2° = <strong style="color:#6060ee">2°</strong>,
        3° = <strong style="color:#886644">3°</strong> (3° solo para los 8 terceros que clasifican).
        Toca de nuevo para quitar.
      </div>
    </div>
    <div class="counter-bar" style="flex-direction:column;align-items:flex-start;gap:4px">
      <div style="display:flex;justify-content:space-between;width:100%">
        <span>Seleccionados al R32</span>
        <span class="counter-num">${totalR32} / 32</span>
      </div>
      <div style="display:flex;justify-content:space-between;width:100%">
        <span style="font-size:13px;color:var(--muted)">Terceros clasificados</span>
        <span style="font-size:16px;font-weight:700;color:${tercCnt===8?'var(--green)':'var(--gold2)'}">${tercCnt} / 8</span>
      </div>
    </div>
    <div class="group-grid">
      ${Object.keys(GROUPS).sort().map(g => {
        const pg = draft.grupos[g] || {};
        const tercerosFull = tercCnt >= 8 && !draft.terceros.includes(g);
        return `<div class="group-card"><div class="group-label">Grupo ${g}</div>
          ${GROUPS[g].map(team => {
            const isp1 = pg.p1===team, isp2 = pg.p2===team, isp3 = pg.p3===team;
            const cls  = isp1?'sel-1':isp2?'sel-2':isp3?'sel-3':'';
            const badge= isp1?'<span class="pos-badge p1">1°</span>':
                         isp2?'<span class="pos-badge p2">2°</span>':
                         isp3?'<span class="pos-badge p3">3°</span>':'';
            const wouldBeP3 = !badge && pg.p1 && pg.p2 && !pg.p3;
            const blocked = (!badge && pg.p1 && pg.p2 && pg.p3) || (wouldBeP3 && tercerosFull);
            const flag = FLAGS[team] ? `<span style="font-size:18px;line-height:1">${FLAGS[team]}</span>` : '';
            return `<button class="team-btn ${cls} ${blocked?'blocked':''}" data-g="${g}" data-t="${team}" ${blocked?'disabled':''}>${badge}${flag}${team}</button>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-gold" onclick="nextStep()" ${!allDone?'disabled':''}>
        Continuar a 16avos de Final ▶
      </button>
      ${!allDone?`<div class="muted" style="text-align:center;margin-top:7px">${!allGroups12?'Completa 1° y 2° de los 12 grupos':'Elige exactamente 8 terceros'}</div>`:''}
    </div>`;
}

function stepTerceros() {
  const cnt = draft.terceros.length;
  return `
    <div class="card">
      <div class="card-title">Paso 2: Elige los 8 Mejores Terceros</div>
      <div class="alert info" style="font-size:13px">
        De 12 terceros, solo <strong>8</strong> clasifican. Elige los 8 grupos cuyo 3° crees que pasa.
      </div>
    </div>
    <div class="counter-bar">
      <span>Terceros elegidos</span><span class="counter-num">${cnt} / 8</span>
    </div>
    <div class="group-grid">
      ${Object.keys(GROUPS).sort().map(g => {
        const team3 = draft.grupos[g]?.p3 || '?';
        const chosen = draft.terceros.includes(g);
        const blocked = !chosen && cnt >= 8;
        return `<div class="group-card" style="cursor:pointer;${chosen?'border-color:var(--gold);border-width:2px':''};border:2px solid ${chosen?'var(--gold)':'var(--border)'}"
          onclick="${blocked?'':("toggleTercero('"+g+"')")}">
          <div class="group-label" style="color:${chosen?'var(--gold)':'var(--muted)'}">3° Grupo ${g}</div>
          <div style="font-size:15px;font-weight:700;color:${chosen?'var(--gold)':'#fff'};padding:7px 0;text-align:center">
            ${chosen?'✓ ':''}${team3}
          </div>
          ${chosen?'<div style="font-size:10px;color:var(--gold);text-align:center">CLASIFICADO</div>':''}
          ${blocked?'<div style="font-size:10px;color:var(--muted);text-align:center">bloqueado</div>':''}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-outline btn-sm" style="width:auto;margin-bottom:8px" onclick="prevStep()">◀ Volver</button>
      <button class="btn btn-gold" onclick="nextStep()" ${cnt!==8?'disabled':''}>
        Ver Ronda de 16avos ▶
      </button>
      ${cnt!==8?'<div class="muted" style="text-align:center;margin-top:7px">Elige exactamente 8</div>':''}
    </div>`;
}

window.toggleTercero = g => {
  const i = draft.terceros.indexOf(g);
  if (i >= 0) draft.terceros.splice(i,1);
  else if (draft.terceros.length < 8) draft.terceros.push(g);
  renderStep();
};

function getThirdsFor(matchId) {
  const slots = ['m74','m77','m79','m80','m81','m82','m85','m87'];
  const sorted = [...draft.terceros].sort();
  const idx = slots.indexOf(matchId);
  const g = sorted[idx];
  return g && draft.grupos[g]?.p3 || null;
}

function resolvePos(pos) {
  const rank = pos[0], grp = pos.slice(1);
  const pg = draft.grupos[grp];
  if (!pg) return null;
  return rank==='1'?pg.p1:rank==='2'?pg.p2:null;
}

function getR32Teams(def) {
  if (def.a === '3X') return {home: resolvePos(def.h), away: getThirdsFor(def.id)};
  if (def.h === '3X') return {home: getThirdsFor(def.id), away: resolvePos(def.a)};
  return {home: resolvePos(def.h), away: resolvePos(def.a)};
}

function getMatchWinner(matchId, round) {
  return draft.picks[round]?.[matchId] || null;
}

function stepBracket() {
  const rounds = ['r32','r16','qf','sf'];
  const names  = ['16avos de Final','8avos de Final','Cuartos de Final','Semifinal'];
  const defs   = [R32_DEF, R16_DEF, QF_DEF, SF_DEF];
  const ri     = draft.step - 1;
  const round  = rounds[ri];
  const dlist  = defs[ri];
  const prev   = rounds[ri-1];

  let html = `<div class="card"><div class="card-title">Ronda de ${names[ri]}</div>
    <div class="alert info" style="font-size:13px">Elige el ganador de cada partido.</div></div>`;

  let allPicked = true;
  for (const def of dlist) {
    let home, away;
    if (round==='r32') { const t = getR32Teams(def); home=t.home; away=t.away; }
    else { home=getMatchWinner(def.m1,prev); away=getMatchWinner(def.m2,prev); }
    const winner = draft.picks[round]?.[def.id];
    if (!winner) allPicked = false;
    html += `<div class="match-row">
      <div class="match-num">${def.id.toUpperCase()}</div>
      <div class="match-teams">
        <button class="match-team ${winner===home?'winner':winner&&home?'loser':''} ${!home?'tbd':''}"
          ${!home?'disabled':''} onclick="pickWin('${round}','${def.id}','${(home||'').replace(/'/g,"\\'")}')">
          ${home ? fl(home) : 'Por definir…'}
        </button>
        <div class="match-vs">vs</div>
        <button class="match-team ${winner===away?'winner':winner&&away?'loser':''} ${!away?'tbd':''}"
          ${!away?'disabled':''} onclick="pickWin('${round}','${def.id}','${(away||'').replace(/'/g,"\\'")}')">
          ${away ? fl(away) : 'Por definir…'}
        </button>
      </div>
    </div>`;
  }
  html += `<div style="margin-top:16px">
    <button class="btn btn-outline btn-sm" style="width:auto;margin-bottom:8px" onclick="prevStep()">◀ Volver</button>
    <button class="btn btn-gold" onclick="nextStep()" ${!allPicked?'disabled':''}>${draft.step===5?'Ver Final ▶':'Continuar ▶'}</button>
    ${!allPicked?'<div class="muted" style="text-align:center;margin-top:7px">Elige todos los ganadores</div>':''}
  </div>`;
  return html;
}

window.pickWin = (round, matchId, team) => {
  if (!team) return;
  draft.picks[round][matchId] = team;
  const order = ['r32','r16','qf','sf'];
  const idx = order.indexOf(round);
  for (let i=idx+1;i<order.length;i++) draft.picks[order[i]] = {};
  draft.champion = draft.second = draft.third = draft.fourth = null;
  renderStep();
};

function stepFinal() {
  const sf1w = draft.picks.sf?.sf1;
  const sf2w = draft.picks.sf?.sf2;
  const sfDefs = {sf1: SF_DEF[0], sf2: SF_DEF[1]};
  const getLsf = (sfId) => {
    const w = draft.picks.sf?.[sfId];
    const d = sfDefs[sfId];
    if (!w) return null;
    const a = getMatchWinner(d.m1,'qf');
    const b = getMatchWinner(d.m2,'qf');
    return a===w ? b : a;
  };
  const sf1l = getLsf('sf1'), sf2l = getLsf('sf2');
  const ch = draft.champion, trd = draft.third;

  const finalMatch = (home, away, winField, losField, label) => {
    const winner = draft[winField];
    return `<div class="match-row">
      <div class="match-num">${label}</div>
      <div class="match-teams">
        <button class="match-team ${winner===home?'winner':winner&&home?'loser':''} ${!home?'tbd':''}"
          ${!home?'disabled':''} onclick="setFinal('${(home||'').replace(/'/g,"\\'")}','${(away||'').replace(/'/g,"\\'")}','${winField}','${losField}')">
          ${home ? fl(home) : 'Por definir…'}
        </button>
        <div class="match-vs">vs</div>
        <button class="match-team ${winner===away?'winner':winner&&away?'loser':''} ${!away?'tbd':''}"
          ${!away?'disabled':''} onclick="setFinal('${(away||'').replace(/'/g,"\\'")}','${(home||'').replace(/'/g,"\\'")}','${winField}','${losField}')">
          ${away ? fl(away) : 'Por definir…'}
        </button>
      </div>
    </div>`;
  };

  let html = `<div class="card"><div class="card-title">Gran Final & 3er Puesto</div></div>
    <div class="round-title">🏆 GRAN FINAL</div>
    ${finalMatch(sf1w, sf2w, 'champion', 'second', 'FINAL')}
    ${ch?`<div class="champ-box"><div class="champ-trophy">🏆</div><div class="champ-label">Tu Campeón Predicho</div><div class="champ-name">${fl(ch)}</div></div>`:''}
    <div class="round-title">🥉 TERCER PUESTO</div>
    ${finalMatch(sf1l, sf2l, 'third', 'fourth', '3°/4°')}
    <div style="margin-top:16px">
      <button class="btn btn-outline btn-sm" style="width:auto;margin-bottom:8px" onclick="prevStep()">◀ Volver</button>
      <button class="btn btn-gold" onclick="nextStep()" ${!ch||!draft.third?'disabled':''}>Continuar al Goleador ▶</button>
    </div>`;
  return html;
}

window.setFinal = (winner, loser, wf, lf) => {
  draft[wf] = winner; draft[lf] = loser; renderStep();
};

window.previewComprobante = input => {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Compress image before storing
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      draft.comprobante = compressed;
      // Show preview
      const prev = document.getElementById('comprobantePreview');
      if (prev) prev.innerHTML = `<img src="${compressed}" style="max-width:100%;max-height:220px;border-radius:10px;border:2px solid var(--green);margin-top:6px">`;
      // Update button text
      const btn = input.previousElementSibling;
      if (btn) btn.innerHTML = '📷 ✅ Foto cargada — toca para cambiar';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

let _photoTimer;
function debounceScorerPhoto(name) {
  clearTimeout(_photoTimer);
  const img = document.getElementById('scorerPhoto');
  const lbl = document.getElementById('scorerPhotoLoading');
  if (!name || name.length < 3) {
    if (img) { img.style.display='none'; img.src=''; }
    if (lbl) lbl.style.display='none';
    return;
  }
  if (lbl) lbl.style.display='block';
  _photoTimer = setTimeout(async () => {
    try {
      const r = await fetch(
        `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(name)}&prop=pageimages&format=json&pithumbsize=300&origin=*`
      );
      const d = await r.json();
      const src = Object.values(d.query.pages)[0]?.thumbnail?.source || '';
      if (img) { img.src = src; img.style.display = src ? 'block' : 'none'; }
    } catch { if (img) img.style.display='none'; }
    if (lbl) lbl.style.display='none';
  }, 700);
}

function attachGroupEvents() {
  document.querySelectorAll('.team-btn[data-g]').forEach(btn => {
    btn.addEventListener('click', () => {
      const g = btn.dataset.g, team = btn.dataset.t;
      const pg = draft.grupos[g] = draft.grupos[g] || {};
      if      (pg.p1===team) pg.p1 = null;
      else if (pg.p2===team) pg.p2 = null;
      else if (pg.p3===team) { pg.p3 = null; }
      else if (!pg.p1) pg.p1 = team;
      else if (!pg.p2) pg.p2 = team;
      else if (!pg.p3 && draft.terceros.length < 8) pg.p3 = team;
      // sync terceros: add group if it has p3, remove if not
      if (pg.p3 && !draft.terceros.includes(g)) draft.terceros.push(g);
      draft.terceros = draft.terceros.filter(tg => draft.grupos[tg]?.p3);
      renderStep();
    });
  });
}

window.nextStep = () => { draft.step = Math.min(draft.step+1, STEPS.length-1); renderStep(); window.scrollTo(0,0); };
window.prevStep = () => { draft.step = Math.max(draft.step-1, 0); renderStep(); window.scrollTo(0,0); };

window.savePolla = () => {
  const si = document.getElementById('scorerInput');
  if (si) draft.topScorer = si.value.trim();
  // comprobante photo already saved in draft.comprobante via previewComprobante()
  if (!draft.champion) { toast('⚠️ Elige el campeón'); return; }
  if (!draft.topScorer) { toast('⚠️ Escribe el goleador'); return; }
  draft.bracket = {
    r32: Object.values(draft.picks.r32||{}),
    r16: Object.values(draft.picks.r16||{}),
    qf:  Object.values(draft.picks.qf||{}),
    sf:  Object.values(draft.picks.sf||{})
  };
  const polla = {...draft}; delete polla.step;
  if (state.resultados) polla.points = calcPoints(polla, state.resultados);
  state.pollas[polla.id] = polla;
  saveData();
  draft = null;
  toast(`✅ ¡Polla guardada! Avisa al admin para confirmar tu pago de $${GC?.price||3} 💵`);
  showPage('mias');
};

function renderPayTable() {
  const tb = document.getElementById('payTbl');
  if (!tb) return;
  const users = {};
  for (const p of Object.values(state.pollas)) {
    if (!users[p.userName]) users[p.userName] = {name:p.userName, cnt:0, paidCnt:0, comprobantes:[]};
    users[p.userName].cnt++;
    if (p.paid) users[p.userName].paidCnt++;
    if (p.comprobante) users[p.userName].comprobantes.push({img: p.comprobante, polla: p.pollaNr||'?'});
  }
  tb.innerHTML = Object.values(users).map(u => {
    const owes = (u.cnt - u.paidCnt) * (GC?.price||3);
    const comp = u.comprobantes.length
      ? u.comprobantes.map(c=>`<a href="${c.img}" target="_blank"><img src="${c.img}" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:2px solid var(--green);margin-right:4px" title="Polla #${c.polla}"></a>`).join('')
      : '<span style="color:var(--muted)">—</span>';
    return `<tr>
      <td><strong>${u.name}</strong></td>
      <td>${u.cnt}</td>
      <td>${owes>0?'$'+owes:'—'}</td>
      <td style="font-size:12px;color:var(--gold)">${comp}</td>
      <td><button class="btn btn-sm ${u.paidCnt===u.cnt?'btn-green':'btn-red'}"
        onclick="togglePaid('${u.name.replace(/'/g,"\\'")}')">
        ${u.paidCnt===u.cnt?'✓ Pagó':'✗ Debe'}
      </button></td>
      <td><button class="btn btn-sm" style="background:#5a0000;color:#fff"
        onclick="deleteUser('${u.name.replace(/'/g,"\\'")}')">🗑️</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted)">Sin participantes todavía</td></tr>';
}

window.togglePaid = name => {
  const pollas = Object.values(state.pollas).filter(p => p.userName === name);

  pollas.forEach(p => { state.pollas[p.id].paid = !allPaid; });
  saveData();
  window.scrollTo(0,0);
  renderAdmin();
  toast(allPaid ? '🔴 Marcado: Debe' : '🟢 Marcado: Pagó');
};

window.deleteUser = name => {
  if (!confirm(`¿Borrar TODAS las pollas de "${name}"? Esta acción no se puede deshacer.`)) return;
  const ids = Object.keys(state.pollas).filter(id => state.pollas[id].userName === name);
  ids.forEach(id => {
    delete state.pollas[id];
    if (firebaseOK) db.ref(gRef('pollas/'+id)).remove();
  });
  saveData();
  window.scrollTo(0,0);
  renderAdmin();
  toast(`🗑️ Pollas de "${name}" eliminadas`);
};

window.deletePolla = id => {
  if (!confirm('¿Borrar esta polla?')) return;
  const name = state.pollas[id]?.userName;

  if (firebaseOK) db.ref(gRef('pollas/'+id)).remove();

  window.scrollTo(0,0);

};

window.saveManualResults = () => {
  const g = id => (document.getElementById(id)||{}).value?.trim()||'';

    bracket: state.resultados?.bracket || {},

  recalcAll(true);

async function migrateFamily() {
  if (!firebaseOK || !db) return;
  const snap = await db.ref('/groups/cooperativa-familiar/config').once('value');
  if (snap.exists()) return; // already migrated
  // Create family group
  await db.ref('/groups/cooperativa-familiar/config').set({
    name: 'Cooperativa Familiar Landazuri Melo',
    price: 3,
    createdAt: new Date().toISOString()
  });
  // Copy existing pollas
  const pollasSnap = await db.ref('/pollas').once('value');
  if (pollasSnap.exists()) {
    await db.ref('/groups/cooperativa-familiar/pollas').set(pollasSnap.val());
  }
  const resSnap = await db.ref('/resultados').once('value');
  if (resSnap.exists()) {
    await db.ref('/groups/cooperativa-familiar/resultados').set(resSnap.val());
  }
  console.log('✅ Family data migrated');
}

function init() {
  initFirebase();
  migrateFamily();
}
